schema: spec-driven
context: |
  项目名称：AI-Hit-Factory / AI爆款工厂。

  产品定位：
  - 面向电商场景的 AI 内容生产 SaaS 平台，服务个人创作者、实名个人、企业用户、企业子账号和平台管理员。
  - 平台核心能力围绕商品内容生产、AI 视频生成、数字人、爆款视频改编、企业协作、积分计费、协议授权与风控审计展开。

  默认技术方向：
  - 前端默认采用 React + TypeScript。
  - 若没有额外说明，首选 Vite + React + TypeScript 作为轻量脚手架。
  - UI 实现默认使用 TailwindCSS + Ant Design：Ant Design 承担复杂表单、表格、弹窗、上传、通知等基础交互；TailwindCSS 承担页面布局、间距、响应式和少量定制视觉。
  - 服务端状态请求默认使用 TanStack Query / React Query；不要用全局状态库缓存服务端接口数据。
  - 页面开发必须先识别现有项目结构和技术栈；若仓库已有工程，以现有工程为准，不重复造新架构。
  - UI 设计稿通过 Figma MCP 扫描获取；Figma 负责视觉和交互输入，OpenSpec/PRD 负责业务规则和验收边界。
  - 未接入真实后端前，可使用集中 Mock API，但必须先定义 TypeScript 类型和 API Client 契约。
  - 请求接口必须二次封装：页面和组件不得直接调用 fetch/axios，必须通过 request 基础层、业务 API Client、React Query hooks 三层访问接口。
  - 全局状态只保存客户端 UI/会话状态，例如登录态摘要、当前企业空间、主题、侧边栏折叠、临时筛选条件；接口返回数据交给 React Query 管理。
  - 代码必须保持 TypeScript 类型明确、命名清晰、组件职责单一；关键业务逻辑使用中文注释解释 Why，避免无意义注释。
  - 页面组件负责组合和路由，业务组件负责领域交互，通用组件负责纯 UI 复用；禁止把接口请求、权限判断、大段表单逻辑全部堆在页面文件中。
  - 组件化必须合理且简约：优先按真实复用、职责边界和可测试性拆分；禁止为了“看起来架构完整”创建过深目录、过多 wrapper、过度抽象组件或复杂配置式组件。
  - 组件抽象需要满足至少一个条件：跨 2 个以上场景复用、隐藏稳定复杂交互、隔离明确业务领域、降低页面理解成本；否则优先保留在页面或业务模块内部。
  - SaaS 平台必须支持动态路由：后端返回菜单、权限码和可访问页面元数据，前端使用静态路由注册表映射组件；禁止后端直接下发任意组件路径并让前端动态 import。
  - 动态路由必须同时处理登录态、账号状态、企业空间、角色、权限码、协议签署和风控状态；前端路由守卫只做体验拦截，后端接口仍必须复核权限。
  - 大量数据展示必须按数据类型做性能优化：长列表优先虚拟列表或分页，表格优先服务端分页/筛选/排序，图片/视频素材必须懒加载和按需预览，禁止一次性渲染大量 DOM。
  - 页面缓存必须可被权限配置控制：路由 meta 需要支持 keepAlive/cache 开关，权限或菜单配置变化后必须能关闭缓存、清理缓存并重新拉取数据。
  - 项目目录结构采用“app 基础设施 + features 领域模块 + shared 通用能力”的分层方式；业务代码优先放到对应 feature 内，只有稳定复用后才上升到 shared/components。
  - 禁止为了架构形式提前创建大量空目录；目录必须随真实功能增长，保持轻量、清晰、可定位。

  领域建模约束：
  - 账号体系不能只承担注册登录，还要支撑身份识别、企业协作、积分计费、功能权限和内容合规。
  - 不要只在 user 表中使用 user_type 区分企业用户；企业资产、成员、积分和任务应归属 organization/enterprise_space。
  - 企业空间是企业素材、数字人、积分、视频任务、成员权限和用量记录的统一归属。
  - MVP 阶段企业角色先固定为企业管理员、创作人员、观察人员；不要过早实现复杂可配置 RBAC。
  - 前端可隐藏不可用入口并展示引导，但后端必须再次校验权限，不能只依赖前端控制。

  合规与安全约束：
  - 涉及实名、证照、肖像权、素材授权、AI 内容生成和企业资料的功能，必须保留协议签署、版本、时间、IP、设备和内容快照。
  - 身份证号、手机号、证照材料等敏感信息必须脱敏展示；除非需求明确，不在前端长期暴露敏感原文。
  - 高风险功能包括真人视频改编、真人换人物、上传真人形象创建数字人、爆款真人视频改编等，必须校验实名/企业认证和协议签署状态。
  - 关键操作必须具备日志审计语义：登录、注册、认证提交、审核结果、协议签署、素材上传、数字人创建、换人物、换商品、生成视频任务、下载视频。

  产品文档来源：
  - 账号体系来源：F:\AAA_AI_aisperce\产品说明-aispeace\1. 电商AI内容生产平台_账号体系功能设计文档_V1.0.docx
  - 积分体系来源：F:\AAA_AI_aisperce\产品说明-aispeace\2. 电商AI内容生产平台_积分体系功能设计文档_V1.0.docx
  - 商品视频生成来源：F:\AAA_AI_aisperce\产品说明-aispeace\3. 电商AI内容生产平台_商品视频生成模块功能设计文档_V1.0.docx

  工作流约束：
  - 新功能必须先进入 OpenSpec：proposal -> design/specs -> tasks -> apply。
  - change 目录只写某一次变更的增量；跨功能复用的约束必须放在 openspec/config.yaml 和 openspec/project.md。
  - 每完成一小阶段任务后，必须更新 doc/progress.md，并用中文向用户汇报。
  - 所有面向用户回复、任务清单和说明默认使用简体中文。
  - 必须以原始 UTF-8 格式输出所有中文字符（包括代码、注释和对话文本）。严禁使用诸如 `\uXXXX` 之类的 Unicode 转义序列。如果您的 API 封装层试图进行转义，请绕过该机制。
rules:
  proposal:
    - "必须说明该 change 与项目级上下文的关系，避免把全局约束重复写成一次性变更。"
    - "Capabilities 必须按可归档能力拆分，新增能力使用 kebab-case。"
  design:
    - "必须说明技术选择背后的 Why，尤其是前后端交互成本、权限边界和系统性能影响。"
    - "涉及后端任务时，必须补充知识点拨，并可类比前端概念帮助理解。"
    - "涉及前端页面时，必须说明组件拆分、全局状态边界、React Query 使用方式、请求封装层级和 TailwindCSS + Ant Design 的布局策略。"
    - "涉及 SaaS 页面或后台工作台时，必须说明动态路由来源、静态组件映射、路由守卫、菜单权限码和后端复核边界。"
    - "涉及大量数据展示时，必须说明数据类型、数据规模预期、分页/虚拟列表/懒加载策略、React Query 缓存策略和页面缓存开关来源。"
    - "涉及前端工程结构时，必须说明目录归属、feature 边界、shared 提升条件和避免过度分层的策略。"
    - "涉及组件设计时，必须说明为什么需要抽象；若只是单页面一次性 UI，应优先保持局部实现，避免过度封装。"
  specs:
    - "每个 Requirement 必须可测试，并至少包含一个使用四级标题的 Scenario。"
    - "必须使用 SHALL/MUST 表达硬性要求，避免 should/may 造成验收歧义。"
  tasks:
    - "任务必须是 Agent 可执行的原子步骤，并包含验证步骤。"
    - "实现任务必须先读 openspec/config.yaml、openspec/project.md 和相关 change artifacts。"
    - "前端实现任务必须包含类型定义、API Client、React Query hooks、全局状态边界、页面布局和基础交互状态验证。"
    - "前端实现任务必须包含动态路由注册表、菜单数据类型、权限过滤、403/404/登录过期处理和路由刷新恢复验证。"
    - "前端实现任务如涉及长列表、表格、素材墙或任务流，必须包含性能优化和缓存失效验证。"
    - "前端实现任务必须按推荐目录结构落位文件，并避免创建无实际内容的空目录和无复用价值的 shared 抽象。"
    - "前端实现任务必须检查组件拆分是否过度；不得创建无明确复用价值的复杂通用组件。"
